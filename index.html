<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <h1>Water Quest</h1>
    <p id="game-instructions" class="game-instructions">Collect 20 items in 30 seconds to complete Level 1!</p>
    <div class="stats">
      <p>Level: <span id="current-level">1</span></p>
      <p>Water Drops: <span id="current-cans">0</span></p>
      <p>Time Left: <span id="timer">30</span>s</p>
    </div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <button id="start-game">Start Game</button>
  </div>

  <div id="end-game-popup" class="popup-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="popup-message">
    <div class="popup-content">
      <p id="popup-message"></p>
      <button id="play-again">Start New Game</button>
    </div>
  </div>

  <footer class="site-footer">
    <p>
      Learn more at
      <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">Charity: Water</a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
